    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Transparent header specific to the immersive page */
        .header.immersive-header {
            background-color: transparent !important;
            border-bottom: none !important;
            backdrop-filter: none !important;
        }
        .header.immersive-header .logo-red, 
        .header.immersive-header .nav a {
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        .header.immersive-header .dropdown-content {
            background-color: rgba(0, 0, 0, 0.8);
            border-color: rgba(255, 255, 255, 0.1);
        }
        .header.immersive-header .dropdown-content a {
            color: #fff;
        }
        .header.immersive-header .dropdown-content a:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }
        body { margin: 0; padding: 0; }
    </style>
</head>
<body class="immersive-page">

    <!-- Transparent Header -->
    <header class="header immersive-header">
        <div class="logo">
            <a href="index.html" style="text-decoration: none;"><span class="logo-red">MIGUN</span></a>
        </div>
        <nav class="nav">
            <div class="dropdown">
                <a href="#">Products <svg class="dropdown-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg></a>
                <div class="dropdown-content">
                    <a href="brain-pillow.html">Brain Health Pillow</a>
                    <a href="index.html#series">Re:series</a>
                </div>
            </div>
            <a href="index.html#technology">Technology</a>
            <a href="index.html#support">Customer Support</a>
        </nav>
        <button class="menu-btn" aria-label="Menu" style="color: white;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
        </button>
    </header>

    <!-- Spline 3D Fullscreen Background (Hero) -->
    <div class="hero-spline-section">
        <div class="immersive-spline fade-in">
            <iframe src='https://my.spline.design/aibrain-3MtUNqHkoKSElDPpvilTHpsj/' frameborder='0' width='100%' height='100%'></iframe>
        </div>
        <!-- Majesty Overlay Content -->
        <div class="immersive-overlay fade-in" style="transition-delay: 0.3s;">
            <h1>Brain Health Pillow</h1>
            <p>혈행 개선 및 수면 유도를 위한 PEMF 발생 모듈이 내장된 기능성 베개</p>
        </div>
    </div>

    <!-- Apple-style Interactive Product Showcase Section -->
    <section class="product-showcase">
        <h2 class="showcase-title fade-in">Designed for Absolute Rest</h2>
        <p class="showcase-desc fade-in">인체공학적 셀 구조와 첨단 열/파동 기술이 결합되어 전에 없던 휴식을 경험하세요.</p>
        
        <div class="tilt-container fade-in" style="transition-delay: 0.2s;">
            <div class="tilt-box" id="pillowTilt">
                <!-- User's pillow image placeholder -->
                <img src="pillow.jpg" alt="MIGUN Brain Health Pillow" onerror="this.src='https://images.unsplash.com/photo-1505693314120-0d443867891c?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80'">
            </div>
        </div>
    </section>

    <script src="script.js"></script>
    <script>
        // 3D Hover Tilt Effect Logic
        const tiltBox = document.getElementById('pillowTilt');

        tiltBox.addEventListener('mousemove', (e) => {
            const rect = tiltBox.getBoundingClientRect();
            // Calculate mouse position relative to the center of the box
            const x = e.clientX - rect.left - rect.width / 2;
            const y = e.clientY - rect.top - rect.height / 2;
            
            // Adjust sensitivity here (higher divisor = less tilt)
            const tiltX = (y / rect.height) * -20; 
            const tiltY = (x / rect.width) * 20;

            tiltBox.style.transform = `rotateX(${tiltX}deg) rotateY(${tiltY}deg)`;
        });

        tiltBox.addEventListener('mouseleave', () => {
            // Reset position on mouse leave
            tiltBox.style.transform = 'rotateX(0deg) rotateY(0deg)';
        });
    </script>
</body>
</html>
